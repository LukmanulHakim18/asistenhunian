name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  DEPLOY_DIR: /home/slnexpre/asistenhunian/asisten-hunian-fe

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build
        run: npm ci && npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Package standalone build
        run: |
          # Salin static & public ke dalam standalone sebelum dipack
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf standalone.tar.gz -C .next standalone

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload build via SCP
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            standalone.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_DIR }}/standalone.tar.gz

      - name: Extract & Restart PM2 on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ env.DEPLOY_DIR }}

            echo "--- Extract build ---"
            tar -xzf standalone.tar.gz
            rm standalone.tar.gz

            echo "--- Restart PM2 ---"
            cd standalone
            PORT=3000 pm2 reload asisten-hunian-fe \
              || PORT=3000 pm2 start server.js --name "asisten-hunian-fe"
            pm2 save

            echo "Deploy selesai — $(date)"
